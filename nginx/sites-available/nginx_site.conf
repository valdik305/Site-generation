# HTTP — перенаправляем на HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Логи (опционально)
    access_log /var/log/nginx/example.com-access.log;
    error_log /var/log/nginx/example.com-error.log;

    # Перенаправление на HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS — основная конфигурация
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com www.example.com;

    # SSL сертификаты (заполнит Certbot)
    ssl_certificate /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/example.com/chain.pem;

    # Включаем общие SSL-настройки и заголовки безопасности
    include snippets/ssl-params.conf;
    include snippets/security-headers.conf;

    # Корневая директория сайта
    root /var/www/example.com/html;
    index index.html index.htm index.nginx-debian.html;

    # Логи
    access_log /var/log/nginx/example.com-ssl-access.log;
    error_log /var/log/nginx/example.com-ssl-error.log;

    # Основные правила
    location / {
        try_files $uri $uri/ =404;
    }

    # Кеширование статики
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|webp|svg)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
    }
}
